defaults:
  - dataset: fb15k237
  - model: inn_ours_mlp
  - _self_

hydra:
  run:
    dir: logs/${now:%Y-%m-%d_%H-%M-%S}

mode: "train"
seed: 42
device: "auto"
tensorboard_dir: "runs"
checkpoint_dir: "checkpoints"

training:
  epochs: 500
  batch_size: 2048
  lr: 0.001
  num_negatives_train: 64
  log_interval: 10

evaluation:
  split: "test"
  num_negatives: 1024
  entity_chunk_size: 2048
