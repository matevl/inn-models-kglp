# @package _global_
defaults:
  - override /dataset: fb15k237
  - override /model: inn_ours_mlp

model:
  loss_type: "logsumexp"

training:
  epochs: 500
  batch_size: 1024
  lr: 0.001
  num_negatives_train: 128
  log_interval: 10

evaluation:
  split: "test"
  num_negatives: 1024
  entity_chunk_size: 1024

checkpoint: "inn_ours_mlp_fb15k237_v1.pt"
experiment_name: "inn_ours_mlp_fb15k237_v1"
