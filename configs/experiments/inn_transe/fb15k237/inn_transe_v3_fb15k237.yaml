# @package _global_
defaults:
  - override /dataset: fb15k237
  - override /model: inn_transe

model:
  loss_type: "bce"
  gamma_margin: 9.0
  alpha: 1.0
  dim: 500

training:
  epochs: 500
  batch_size: 1024
  lr: 0.001
  num_negatives_train: 256
  log_interval: 10

evaluation:
  split: "test"
  num_negatives: -1
  entity_chunk_size: 512
  batch_size: 512

checkpoint: "inn_transe_fb15k237_v3.pt"
experiment_name: "inn_transe_fb15k237_v3"
