# @package _global_
defaults:
  - override /dataset: fb15k237
  - override /model: inn_ours_mlp

model:
  loss_type: "self_adversarial"
  alpha: 1.0

training:
  epochs: 500
  batch_size: 2048
  lr: 0.001
  num_negatives_train: 128
  log_interval: 10

evaluation:
  split: "test"
  num_negatives: -1
  entity_chunk_size: 512
  batch_size: 512

checkpoint: "inn_ours_mlp_v5_fb15k237.pt"
experiment_name: "inn_ours_mlp_v5_fb15k237"
